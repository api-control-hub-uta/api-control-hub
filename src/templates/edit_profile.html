<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #141414;
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        form {
            background: #222;
            width: 320px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            color: #aaa;
            display: block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Edit Profile</h1>

    <form method="post" action="/profiles/edit/{{ profile[0] }}">
        <input name="name" value="{{ profile[1] }}" required>
        <button type="submit">Save Changes</button>
    </form>

    <a href="/">Back</a>

</body>
</html>
