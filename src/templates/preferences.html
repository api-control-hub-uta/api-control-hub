<!DOCTYPE html>
<html>
<head>
    <title>Set Preferences</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #141414;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 760px;
            margin: 60px auto;
            background: #1f1f1f;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #b3b3b3;
            margin-bottom: 30px;
            font-size: 18px;
        }

        form {
            text-align: left;
            max-width: 500px;
            margin: auto;
        }

        h2 {
            margin-top: 30px;
            margin-bottom: 15px;
            color: #4a90e2;
            font-size: 24px;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #4a90e2;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #357abd;
        }

        .back-link {
            margin-top: 25px;
            text-align: center;
        }

        .back-link a {
            color: #ccc;
            text-decoration: none;
        }

        .back-link a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Set Preferences</h1>
        <div class="subtitle">
            Tell us your temperature comfort levels and what you prefer to wear in each condition.
        </div>

        <form method="post" action="/preferences/{{ profile[0] }}">

            <h2>Temperature Preferences</h2>

            <label>At what temperature do you feel hot? (°F)</label>
            <input type="number" name="hot_threshold" placeholder="Example: 85" required>

             <label>At what temperature do you feel Moderate? (°F)</label>
            <input type="number" name="moderate_threshold" placeholder="Example: 70" required>

            <label>At what temperature do you feel cold? (°F)</label>
            <input type="number" name="cold_threshold" placeholder="Example: 50" required>

            <label>At what temperature do you feel extreme cold? (°F)</label>
            <input type="number" name="extreme_cold_threshold" placeholder="Example: 35" required>

            <h2>Clothing Preferences</h2>

            <label>What would you wear when it is hot?</label>
            <input type="text" name="hot_clothing" placeholder="Example: T-shirt" required>

            <label>What would you wear when it is moderate?</label>
            <input type="text" name="moderate_clothing" placeholder="Example: Hoodie" required>

            <label>What would you wear when it is cold?</label>
            <input type="text" name="cold_clothing" placeholder="Example: Jacket" required>

            <label>What would you wear when it is extreme cold?</label>
            <input type="text" name="extreme_cold_clothing" placeholder="Example: Coat" required>

            <button type="submit">Save Preferences</button>
        </form>

        <div class="back-link">
            <a href="/dashboard/{{ profile[0] }}">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
